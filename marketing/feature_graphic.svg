<?xml version="1.0" encoding="UTF-8"?>
<!--
  Play Store feature graphic, 1024x500.

  Layout: a scaled-down 3x3 puzzle on the left + the app name and a one-line
  tagline on the right. Background uses the same "empty cell" cyan as the
  app itself, for visual continuity with the launcher icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <style>
      .bg-page    { fill: #e8f6f9; }
      .bg-empty   { fill: #c0ebf1; }
      .bg-black   { fill: #000000; }
      .bg-white   { fill: #ffffff; }
      .border     { fill: none; stroke: #448aff; stroke-width: 1.27; }
      .border-fixed { fill: none; stroke: #448aff; stroke-width: 7.6; }
      .title    { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  font-weight: 700; font-size: 56px; fill: #1a3a55;
                  text-anchor: middle; }
      .tagline  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  font-weight: 400; font-size: 26px; fill: #3a5d72;
                  text-anchor: middle; }
      .subline  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  font-weight: 400; font-size: 20px; fill: #5a7a8a;
                  text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg-page" x="0" y="0" width="1024" height="500"/>

  <!-- 3x3 puzzle, scaled from 300x300 to 380x380, placed at (60,60). -->
  <g transform="translate(60,60) scale(1.2667)">
    <rect class="bg-empty" x="0"   y="0"   width="100" height="100"/>
    <rect class="bg-empty" x="100" y="0"   width="100" height="100"/>
    <rect class="bg-black" x="200" y="0"   width="100" height="100"/>
    <rect class="bg-empty" x="0"   y="100" width="100" height="100"/>
    <rect class="bg-empty" x="100" y="100" width="100" height="100"/>
    <rect class="bg-empty" x="200" y="100" width="100" height="100"/>
    <rect class="bg-white" x="0"   y="200" width="100" height="100"/>
    <rect class="bg-empty" x="100" y="200" width="100" height="100"/>
    <rect class="bg-empty" x="200" y="200" width="100" height="100"/>

    <rect class="border"       x="0"   y="0"   width="100" height="100"/>
    <rect class="border"       x="100" y="0"   width="100" height="100"/>
    <rect class="border-fixed" x="200" y="0"   width="100" height="100"/>
    <rect class="border"       x="0"   y="100" width="100" height="100"/>
    <rect class="border"       x="100" y="100" width="100" height="100"/>
    <rect class="border"       x="200" y="100" width="100" height="100"/>
    <rect class="border-fixed" x="0"   y="200" width="100" height="100"/>
    <rect class="border"       x="100" y="200" width="100" height="100"/>
    <rect class="border"       x="200" y="200" width="100" height="100"/>

    <g transform="translate(50,50)" stroke="#000000" stroke-width="3.5"
       stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="0" r="22"/>
      <line x1="-9" y1="0" x2="9" y2="0"/>
      <polyline points="3,-7 10,0 3,7"/>
    </g>
    <path d="M 116.67,150 A 33.33,18.33 0 0,1 183.33,150 A 33.33,18.33 0 0,1 116.67,150 Z"
          fill="#000000" stroke="#ffffff" stroke-width="3.3"/>
    <text x="150" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="68" font-weight="700"
          text-anchor="middle" dominant-baseline="central"
          fill="#000000" stroke="#ffffff" stroke-width="4" paint-order="stroke fill">3</text>
    <g transform="translate(50,250)" fill="none" stroke="#000000" stroke-width="5">
      <circle cx="0" cy="0" r="30"/>
      <circle cx="0" cy="0" r="20"/>
      <circle cx="0" cy="0" r="7.5"/>
    </g>
  </g>

  <!-- Right column: title + tagline + small print, centred on x=730 (mid
       of the 460..1000 area). -->
  <g>
    <text class="title"   x="730" y="210">Get Some Puzzle</text>
    <text class="tagline" x="730" y="260">Pure-deduction logic puzzles.</text>
    <text class="subline" x="730" y="320">No luck. No ads. No tracking.</text>
    <text class="subline" x="730" y="350">Free and open source.</text>
  </g>
</svg>
