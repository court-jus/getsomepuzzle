name: CI
on:
  workflow_dispatch:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Run tests
        run: flutter test
  build-apk:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build APK
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - name: Install Dependencies
        run: flutter pub get
      - name: Build
        run: flutter build apk --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ApkReleases
          path: build/app/outputs/flutter-apk/app-release.apk
  build-windows:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    name: Build Windows
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - name: Install Dependencies
        run: flutter pub get
      - name: Build
        run: flutter build windows
      - name: package
        run: |
          cd build
          tar -czvf windows-build.tgz windows/x64/runner/Release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsRelease
          path: build/windows-build.tgz
  build-web:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build Web
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - name: Install Dependencies
        run: flutter pub get
      - name: Build
        run: flutter build web --base-href=/getsomepuzzle/
      - name: package
        run: |
          cd build
          tar -czvf web-build.tgz web
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebRelease
          path: build/web-build.tgz
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-apk, build-windows, build-web]
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ApkReleases
          path: artifacts/apk
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: WindowsRelease
          path: artifacts/windows
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: WebRelease
          path: artifacts/web
      - name: Extract version from pubspec.yaml
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          echo "VERSION=$version" >> $GITHUB_ENV
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: v${{ env.VERSION }}
          artifacts: "artifacts/apk/app-release.apk,artifacts/windows/windows-build.tgz,artifacts/web/web-build.tgz"
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-web]
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: WebRelease
          path: artifacts/web
      - name: Extract web build
        run: |
          cd artifacts/web
          tar -xzf web-build.tgz
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/web/web
